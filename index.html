<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Going Yard</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon-192.png" type="image/png">

    <!-- ── PWA ──────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a1628">

    <!-- iOS install support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Going Yard">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <!-- ────────────────────────────────────────────────────────────── -->

    <!-- Push notification keys (injected at build time by Vite) -->
    <script>
      window.__VAPID_KEY__     = "%VITE_VAPID_PUBLIC_KEY%";
      window.__NOTIFY_SECRET__ = "%VITE_NOTIFY_SECRET%";
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
